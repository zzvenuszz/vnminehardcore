# ============================================================
# [SOUL ERUPTION] 💀 THẦN HỒN CÂU DIỆT
# ============================================================
# [VI] Soul sand phát nổ, Wither effect, spawn Wither Skeleton. Nether only.
# [EN] Soul sand explodes, Wither effect, spawns Wither Skeleton. Nether only.

disaster-id: soul-eruption
enabled: true
chance: 2
name: "§2§l💀 Thần Hồn Câu Diệt"
duration-seconds: 120
effect-interval-seconds: 4
warning-seconds: 120

conditions:
  only-night: false
  only-day: false
  worlds: ["world_nether"]
  min-players-online: 1

start-title: "§2§l💀 Thần Hồn Câu Diệt"
start-subtitle: "Linh hồn đang gào thét!"
start-sound: ENTITY_WITHER_SPAWN
start-sound-volume: 1.0
start-sound-pitch: 0.8

actions:
  - type: damage
    condition:
      require-outdoor: true
      ignore-safe-zone: false
    targets:
      player:
        weight: 100
        worlds: ["world_nether"]
    damage: 2.0
    ignore-armor: false

  - type: potion_effect
    condition:
      require-outdoor: true
      ignore-safe-zone: false
    targets:
      player:
        weight: 100
        worlds: ["world_nether"]
    effects:
      - type: WITHER
        duration-ticks: 100
        amplifier: 1
      - type: SLOWNESS
        duration-ticks: 60
        amplifier: 1

  - type: explosion
    condition:
      require-outdoor: true
      ignore-safe-zone: false
    targets:
      player:
        weight: 100
        worlds: ["world_nether"]
    count-per-player: 1
    radius: 4
    explosion-power: 2.0
    explosion-fire: false
    explosion-break-blocks: true

  - type: spawn_mobs
    condition:
      require-outdoor: true
      ignore-safe-zone: false
    count-per-player: 1
    radius: 5
    targets:
      player:
        weight: 100
        worlds: ["world_nether"]
    mobs:
      WITHER_SKELETON:
        weight: 100

  - type: action_bar
    condition:
      require-outdoor: false
      ignore-safe-zone: true
    targets:
      all_players:
        weight: 100
    message: "§2§l💀 SOUL ERUPTION! Linh hồn gào thét!"

on-end:
  - type: broadcast
    message: "§a💀 Soul Eruption đã kết thúc."