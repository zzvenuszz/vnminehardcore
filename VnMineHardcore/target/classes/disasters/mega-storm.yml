# ============================================================
# [MEGA STORM] 🌊 SIÊU BÃO
# ============================================================
# [VI] Sấm sét, mưa axit, mù. Xảy ra ở Overworld.
# [EN] Lightning, acid rain, fog. Occurs in Overworld.

disaster-id: mega-storm
enabled: true
chance: 5
name: "§9§l🌊 Siêu Bão"
duration-seconds: 300
effect-interval-seconds: 10
warning-seconds: 120

conditions:
  only-night: false
  only-day: false
  worlds: ["overworld"]
  min-players-online: 1

start-title: "§9§l🌊 Siêu Bão"
start-subtitle: "Siêu bão đổ bộ!"
start-sound: ENTITY_WITHER_SPAWN
start-sound-volume: 1.0
start-sound-pitch: 0.8

actions:
  - type: lightning_strike
    condition:
      require-outdoor: true
      ignore-safe-zone: false
    targets:
      player:
        weight: 100
    count-per-player: 1
    radius: 5
    explosion-power: 0
    explosion-fire: false
    explosion-break-blocks: false
    delay-ticks: 0

  - type: damage
    condition:
      require-outdoor: true
      ignore-safe-zone: false
    targets:
      player:
        weight: 100
    damage: 1.0
    ignore-armor: false

  - type: potion_effect
    condition:
      require-outdoor: false
      ignore-safe-zone: false
    targets:
      all_players:
        weight: 100
    effects:
      - type: SLOWNESS
        duration-ticks: 30
        amplifier: 1

  - type: set_weather
    storm: true
    thunder: true
    duration-ticks: 200000

  - type: action_bar
    condition:
      require-outdoor: false
      ignore-safe-zone: true
    targets:
      all_players:
        weight: 100
    message: "§9§l🌊 Siêu bão! Tìm nơi trú ẩn!"

on-end:
  - type: clear_weather
  - type: broadcast
    message: "§a🌊 Siêu bão đã tan."