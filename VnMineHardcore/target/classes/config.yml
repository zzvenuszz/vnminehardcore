# ============================================================
# ================== VnMineHardcore v1.0.0 ==================
# ==================   CẤU HÌNH / CONFIG   ==================
# ============================================================
# [VI] File cấu hình chính của plugin VnMineHardcore.
#      Tất cả các thông số đều có thể thay đổi và có giá trị mặc định.
# [EN] Main configuration file for VnMineHardcore plugin.
#      All parameters can be changed and have default values.
# ============================================================

# ============================================================
# [DEATH] ☠ TỬ THẦN / DEATH
# ============================================================
death:
  ban-on-death: true
  ban-ip: true
  broadcast-death: true
  play-sound: true

# ============================================================
# [DEATH PENALTY] 💀 HÌNH PHẠT KHI CHẾT
# ============================================================
death-penalty:
  enabled: true
  recovery-seconds: 300
  max-penalty-stack: 5
  stats:
    max-hp-per-death: 0.1
    max-thirst-per-death: 0.1
    damage-per-death: 0.1
    incoming-damage-per-death: 0.1
    regen-per-death: 0.1
    food-drain-per-death: 0.1
    thirst-drain-per-death: 0.1

# ============================================================
# [COMBAT] ⚔ CHIẾN ĐẤU
# ============================================================
combat:
  mob-damage-multiplier: 2.0
  fall-damage-multiplier: 2.0
  fire-damage-multiplier: 2.0
  drowning-damage-multiplier: 2.0
  explosion-damage-multiplier: 1.5
  pvp-damage-multiplier: 1.25
  mob-extra-hp-multiplier: 1.5
  disable-natural-regen: false
  regen-multiplier: 0.5
  combat-tag-duration-seconds: 30
  ender-pearl-damage: 2.0

# ============================================================
# [HUNGER] 🍔 ĐÓI
# ============================================================
hunger:
  enabled: true
  drain-interval-seconds: 180
  food-restore-multiplier: 0.5
  starvation-damage: 1.0
  sprint-min-food: 6
  raw-food-poison: true
  choke-enabled: true
  choke-max-eats: 3
  choke-window-seconds: 10
  choke-damage: 1.0
  notch-apple-explode: true
  notch-apple-damage: 2.0

# ============================================================
# [THIRST] 💧 KHÁT
# ============================================================
thirst:
  enabled: true
  drain-interval-seconds: 120
  thirst-damage: 1.0
  max-thirst: 20
  drink-from-source: true
  drink-source-restore: 4
  drink-source-cooldown-seconds: 3
  bucket-drink:
    enabled: true
    restore: 10
  bottle-drink:
    enabled: true
    restore: 6
  natural-water:
    enabled: true
    damage-per-second: 0.5
    duration-seconds: 5
    nausea-amplifier: 0
  bottle-fill: true

# ============================================================
# [ENVIRONMENT] 🌍 MÔI TRƯỜNG
# ============================================================
environment:
  temperature:
    enabled: true
    check-interval-seconds: 30
    heat-damage: 1.0
    heat-amplifier: 0
    helmet-reduce-percent: 0.5
    cold-damage: 1.0
    cold-amplifier: 0
    armor-reduce-percent: 0.25
  fog:
    enabled: true
    interval-seconds: 60
    effect-duration-seconds: 30
    effect-amplifier: 0
  sleep:
    block: true
    damage: 1.0
  crop-slow:
    enabled: true
    multiplier: 0.75
  tool-wear:
    enabled: true
    multiplier: 1.5
  flight:
    block: false
  claustrophobia:
    enabled: true
    y-level: 30
    chance: 5
    amplifier: 0
    torch-reduce-percent: 0.5
  vertigo:
    enabled: true
    y-level: 100
    chance: 10
    amplifier: 0
    elytra-reduce-percent: 0.5

# ============================================================
# [VILLAGER TRADING] 🏘️ GIAO DỊCH DÂN LÀNG
# ============================================================
villager-trading:
  enabled: true
  disable-random-villager: true

# ============================================================
# [SPAWNER CONTROL] 🪤 KIỂM SOÁT LỒNG FARM
# ============================================================
spawner-control:
  enabled: true
  spawn-rate-reduction: 0.3
  hp-multiplier: 3.0
  damage-multiplier: 2.0

# ============================================================
# [DISASTERS] 🌋 THIÊN TAI
# ============================================================
disasters:
  enabled: true
  min-interval-seconds: 600
  warning-seconds: 300

  # Overworld
  blood-moon-chance: 30
  meteor-chance: 5
  mega-storm-chance: 5
  solar-flare-chance: 3
  plague-chance: 2
  tornado-chance: 2
  eclipse-chance: 1
  earthquake-chance: 2

  # Nether
  inferno-storm-chance: 3
  soul-eruption-chance: 2
  lava-geyser-chance: 2

  # The End
  end-surge-chance: 2
  void-storm-chance: 2
  chorus-explosion-chance: 1

  # Per-disaster config
  blood-moon:
    effect-interval-seconds: 5
    effect-duration-seconds: 10
  meteor:
    effect-interval-seconds: 3
    effect-duration-seconds: 5
  mega-storm:
    effect-interval-seconds: 4
    effect-duration-seconds: 8
  solar-flare:
    effect-interval-seconds: 3
    effect-duration-seconds: 6
  plague:
    effect-interval-seconds: 7
    effect-duration-seconds: 8
  tornado:
    effect-interval-seconds: 2
    effect-duration-seconds: 4
  eclipse:
    effect-interval-seconds: 5
    effect-duration-seconds: 10
  earthquake:
    effect-interval-seconds: 3
    effect-duration-seconds: 5
    block-fall-chance: 15
    radius: 15
    min-y: 30
    blast-resistance-factor: 0.1
  inferno-storm:
    effect-interval-seconds: 3
    effect-duration-seconds: 5
    damage: 2.0
    fire-ticks: 100
  soul-eruption:
    effect-interval-seconds: 4
    effect-duration-seconds: 8
    wither-amplifier: 1
    damage: 2.0
  lava-geyser:
    effect-interval-seconds: 5
    effect-duration-seconds: 10
    damage: 3.0
  end-surge:
    effect-interval-seconds: 5
    effect-duration-seconds: 8
    shulker-chance: 20
  void-storm:
    effect-interval-seconds: 4
    effect-duration-seconds: 6
    damage: 2.0
  chorus-explosion:
    effect-interval-seconds: 6
    effect-duration-seconds: 10
    damage: 1.0

# ============================================================
# [BOSS EVENTS] 👹 BOSS NGẪU NHIÊN
# ============================================================
boss-events:
  enabled: true
  min-interval-seconds: 1200
  spawn-radius: 50
  bosses:
    wither:
      enabled: true
      entity-type: WITHER
      display-name: "§c§lWither Huyền Thoại"
      hp: 600
      damage-multiplier: 2.0
      chance: 20
      duration-seconds: 120
      warning-seconds: 60
      drops:
        NETHERITE_INGOT:
          min-amount: 1
          max-amount: 3
          chance: 1.0
        DIAMOND_BLOCK:
          min-amount: 1
          max-amount: 5
          chance: 0.5
        WITHER_SKELETON_SKULL:
          min-amount: 1
          max-amount: 1
          chance: 0.3
    ender_dragon:
      enabled: false
      entity-type: ENDER_DRAGON
      display-name: "§5§lRồng Tử Thần"
      hp: 1000
      damage-multiplier: 3.0
      chance: 5
      duration-seconds: 180
      warning-seconds: 120
      drops:
        DRAGON_EGG:
          min-amount: 1
          max-amount: 1
          chance: 0.1
        ELYTRA:
          min-amount: 1
          max-amount: 1
          chance: 0.3
        SHULKER_SHELL:
          min-amount: 2
          max-amount: 4
          chance: 0.5
    giant:
      enabled: false
      entity-type: GIANT
      display-name: "§a§lNgười Khổng Lồ"
      hp: 200
      damage-multiplier: 1.5
      chance: 15
      duration-seconds: 90
      warning-seconds: 45
      drops:
        IRON_BLOCK:
          min-amount: 5
          max-amount: 15
          chance: 0.8
        GOLDEN_APPLE:
          min-amount: 1
          max-amount: 3
          chance: 0.5
    ghast:
      enabled: false
      entity-type: GHAST
      display-name: "§e§lGhast Khổng Lồ"
      hp: 100
      damage-multiplier: 2.5
      chance: 15
      duration-seconds: 90
      warning-seconds: 45
      drops:
        GHAST_TEAR:
          min-amount: 3
          max-amount: 8
          chance: 0.7
        MAGMA_CREAM:
          min-amount: 2
          max-amount: 5
          chance: 0.5

# ============================================================
# [ORE CONTROL] ⛏️ KIỂM SOÁT QUẶNG
# ============================================================
ore-control:
  enabled: false
  worlds:
    world:
      DIAMOND_ORE: 0.18
      EMERALD_ORE: 0.05
      IRON_ORE: 1.20
      GOLD_ORE: 0.45
      COAL_ORE: 2.50
      LAPIS_ORE: 0.30
      REDSTONE_ORE: 1.00
      COPPER_ORE: 1.50
      DEEPSLATE_DIAMOND_ORE: 0.18
      DEEPSLATE_EMERALD_ORE: 0.05
      DEEPSLATE_IRON_ORE: 1.20
      DEEPSLATE_GOLD_ORE: 0.45
      DEEPSLATE_COAL_ORE: 2.50
      DEEPSLATE_LAPIS_ORE: 0.30
      DEEPSLATE_REDSTONE_ORE: 1.00
      DEEPSLATE_COPPER_ORE: 1.50
      NETHER_QUARTZ_ORE: 2.00
      NETHER_GOLD_ORE: 0.80
      ANCIENT_DEBRIS: 0.02

# ============================================================
# [RENAME] 🏷 ĐỔI TÊN HIỂN THỊ SAU KHI CHẾT
# ============================================================
rename:
  enabled: true
  name-structure: "<name> ☠ 000"

# ============================================================
# [LOGGING] 📝 NHẬT KÝ
# ============================================================
logging:
  console-debug: false
  log-deaths: true
  log-bans: true
  log-disasters: true