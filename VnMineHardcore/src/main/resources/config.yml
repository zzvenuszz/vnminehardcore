# ============================================================
# ================== VnMineHardcore v1.0.0 ==================
# ==================   CẤU HÌNH / CONFIG   ==================
# ============================================================
# [VI] File cấu hình chính của plugin VnMineHardcore.
#      Tất cả các thông số đều có thể thay đổi và có giá trị mặc định.
# [EN] Main configuration file for VnMineHardcore plugin.
#      All parameters can be changed and have default values.
# ============================================================

# ============================================================
# [DEATH] ☠ TỬ THẦN / DEATH
# ============================================================
death:
  # [VI] Cấm (ban) người chơi vĩnh viễn khi chết
  # [EN] Permanently ban the player upon death
  ban-on-death: false

  # [VI] Cũng cấm luôn địa chỉ IP (chỉ hoạt động nếu ban-on-death: true)
  # [EN] Also ban the player's IP address (only works if ban-on-death: true)
  ban-ip: false

  # [VI] Thông báo cái chết cho toàn bộ server
  # [EN] Broadcast death message to all players
  broadcast-death: true

  # [VI] Phát âm thanh wither death khi có người chết
  # [EN] Play wither death sound when a player dies
  play-sound: true

# ============================================================
# [DEATH PENALTY] 💀 HÌNH PHẠT KHI CHẾT / DEATH PENALTY
# ============================================================
death-penalty:
  # [VI] Bật hệ thống hình phạt khi chết (giảm chỉ số)
  # [EN] Enable death penalty system (stat reduction)
  enabled: true

  # [VI] Thời gian sống sót sau khi hồi sinh để phục hồi chỉ số (giây)
  #     Nếu người chơi sống sót đủ thời gian này, penalty sẽ được gỡ bỏ
  # [EN] Survival time after respawn to recover stats (seconds)
  #     If the player survives this long, the penalty is removed
  recovery-seconds: 300

  # [VI] Số lần chết tối đa có thể tích lũy penalty (giới hạn trên)
  #     Giúp tránh penalty quá lớn sau nhiều lần chết liên tiếp
  # [EN] Maximum death count that accumulates penalty (upper limit)
  #     Prevents penalty from becoming too large after many consecutive deaths
  max-penalty-stack: 5

  # [VI] Phần trăm giảm chỉ số MỖI LẦN CHẾT (số thập phân, 0.1 = 10%)
  #     Ví dụ: 0.1 = mỗi lần chết giảm 10% chỉ số tương ứng
  # [EN] Percent stat reduction PER DEATH (decimal, 0.1 = 10%)
  #     Example: 0.1 = each death reduces the corresponding stat by 10%
  stats:
    # [VI] % giảm HP tối đa mỗi lần chết
    # [EN] % max HP reduction per death
    max-hp-per-death: 1.0

    # [VI] % giảm max thirst offset mỗi lần chết
    # [EN] % max thirst offset reduction per death
    max-thirst-per-death: 1.0

    # [VI] % giảm sát thương gây ra mỗi lần chết
    # [EN] % damage dealt reduction per death
    damage-per-death: 0.5

    # [VI] % tăng sát thương nhận vào mỗi lần chết
    # [EN] % incoming damage increase per death
    incoming-damage-per-death: 0.5

    # [VI] % giảm hồi phục mỗi lần chết
    # [EN] % regen reduction per death
    regen-per-death: 0.5

    # [VI] % tăng tốc mất thức ăn mỗi lần chết
    # [EN] % food drain increase per death
    food-drain-per-death: 0.5

    # [VI] % tăng tốc mất khát mỗi lần chết
    # [EN] % thirst drain increase per death
    thirst-drain-per-death: 0.5

# ============================================================
# [COMBAT] ⚔ CHIẾN ĐẤU / COMBAT
# ============================================================
combat:
  # ===== SÁT THƯƠNG / DAMAGE MULTIPLIERS =====
  # [VI] Hệ số nhân sát thương từ quái vật (1.0 = bình thường)
  # [EN] Damage multiplier from mobs (1.0 = normal)
  mob-damage-multiplier: 2.0

  # [VI] Hệ số nhân sát thương ngã (1.0 = bình thường)
  # [EN] Fall damage multiplier (1.0 = normal)
  fall-damage-multiplier: 2.0

  # [VI] Hệ số nhân sát thương lửa / dung nham (1.0 = bình thường)
  # [EN] Fire/lava damage multiplier (1.0 = normal)
  fire-damage-multiplier: 2.0

  # [VI] Hệ số nhân sát thương chết đuối (1.0 = bình thường)
  # [EN] Drowning damage multiplier (1.0 = normal)
  drowning-damage-multiplier: 2.0

  # [VI] Hệ số nhân sát thương nổ (1.0 = bình thường)
  # [EN] Explosion damage multiplier (1.0 = normal)
  explosion-damage-multiplier: 1.5

  # [VI] Hệ số nhân sát thương PvP (1.0 = bình thường)
  # [EN] PvP damage multiplier (1.0 = normal)
  pvp-damage-multiplier: 1.25

  # ===== QUÁI VẬT / MOB STATS =====
  # [VI] Hệ số nhân máu tối đa của quái vật (1.0 = bình thường)
  # [EN] Extra max health multiplier for mobs (1.0 = normal)
  mob-extra-hp-multiplier: 1.5

  # ===== HỒI PHỤC MÁU / HEALTH REGENERATION =====
  # [VI] Tắt hoàn toàn hồi phục máu tự nhiên (true = tắt, false = bật)
  # [EN] Completely disable natural health regeneration (true = off, false = on)
  disable-natural-regen: false

  # [VI] Hệ số hồi phục máu (chỉ dùng khi disable-natural-regen: false)
  #     1.0 = hồi phục như vanilla, 0.5 = hồi 50%, 0 = không hồi phục
  # [EN] Regeneration multiplier (only used when disable-natural-regen: false)
  #     1.0 = vanilla regen, 0.5 = 50% regen, 0 = no regen
  regen-multiplier: 0.5

  # ===== CHIẾN ĐẤU (COMBAT TAG) =====
  # [VI] Thời gian duy trì trạng thái combat (giây).
  #     Nếu thoát game khi đang combat sẽ bị ban (combat-log).
  #     Combat kết thúc khi: hết thời gian, hoặc mob từ bỏ truy đuổi.
  # [EN] Combat tag duration (seconds).
  #     Quitting while combat-tagged results in a ban (combat-log).
  #     Combat ends when: timer expires, or mob stops tracking the player.
  combat-tag-duration-seconds: 30

  # ===== VẬT PHẨM / ITEMS =====
  # [VI] Sát thương khi sử dụng Ender Pearl (tim)
  # [EN] Damage taken when using Ender Pearl (hearts)
  ender-pearl-damage: 1.0

# ============================================================
# [HUNGER] 🍔 ĐÓI / HUNGER
# ============================================================
hunger:
  # [VI] Bật hệ thống đói
  # [EN] Enable hunger system
  enabled: true

  # [VI] Thời gian giữa các lần giảm đói (giây)
  # [EN] How often hunger decreases (in seconds)
  drain-interval-seconds: 180

  # [VI] Hệ số hồi phục thức ăn (1.0 = bình thường, 0.5 = 50%)
  # [EN] Food restoration multiplier (1.0 = normal, 0.5 = 50%)
  food-restore-multiplier: 0.5

  # [VI] Sát thương khi đói hoàn toàn (tim)
  # [EN] Damage taken when starving (hearts)
  starvation-damage: 1.0

  # [VI] Mức thức ăn tối thiểu để có thể chạy (0-20)
  # [EN] Minimum food level to be able to sprint (0-20)
  sprint-min-food: 6

  # [VI] Bật ngộ độc khi ăn thức ăn sống (thịt sống, thịt thối, cá nóc...)
  # [EN] Enable raw food poisoning (raw meat, rotten flesh, pufferfish...)
  raw-food-poison: true

  # [VI] Bật hiệu ứng phát nổ khi ăn táo vàng enchanted (Notch Apple)
  # [EN] Enable explosion when eating enchanted golden apple (Notch Apple)
  notch-apple-explode: true

  # [VI] Sát thương từ táo vàng enchanted phát nổ (tim)
  # [EN] Damage from enchanted golden apple explosion (hearts)
  notch-apple-damage: 2.0

# ============================================================
# [THIRST] 💧 KHÁT / THIRST
# ============================================================
thirst:
  # [VI] Bật hệ thống khát nước
  # [EN] Enable thirst system
  enabled: true

  # [VI] Thời gian giữa các lần giảm khát (giây)
  # [EN] How often thirst decreases (in seconds)
  drain-interval-seconds: 120

  # [VI] Sát thương khi khát về 0 (tim)
  # [EN] Damage when thirst reaches 0 (hearts)
  thirst-damage: 2.0

  # [VI] Mức khát tối đa
  # [EN] Maximum thirst level
  max-thirst: 20

  # ===== UỐNG NƯỚC TỪ NGUỒN / DRINK FROM SOURCE =====
  # [VI] Cho phép uống nước trực tiếp từ nguồn nước (sông, hồ, biển, vạc...)
  # [EN] Allow drinking directly from water sources (rivers, lakes, cauldrons...)
  drink-from-source: true

  # [VI] Lượng khát hồi phục khi uống từ nguồn
  # [EN] Thirst restored when drinking from source
  drink-source-restore: 4

  # [VI] Thời gian hồi giữa các lần uống từ nguồn (giây)
  # [EN] Cooldown between drinking from source (seconds)
  drink-source-cooldown-seconds: 3

  # ===== UỐNG NƯỚC TỪ XÔ / DRINK FROM BUCKET =====
  # [VI] Cho phép uống nước từ xô nước (WATER_BUCKET)
  # [EN] Allow drinking from water bucket
  bucket-drink:
    # [VI] Bật uống nước từ xô
    # [EN] Enable drinking from bucket
    enabled: true

    # [VI] Lượng khát hồi phục khi uống từ xô
    # [EN] Thirst restored when drinking from bucket
    restore: 10

  # ===== UỐNG NƯỚC TỪ CHAI / DRINK FROM BOTTLE =====
  # [VI] Cho phép uống nước từ chai thủy tinh (WATER_POTION)
  # [EN] Allow drinking from glass bottle (WATER_POTION)
  bottle-drink:
    # [VI] Bật uống nước từ chai
    # [EN] Enable drinking from bottle
    enabled: true

    # [VI] Lượng khát hồi phục khi uống từ chai
    # [EN] Thirst restored when drinking from bottle
    restore: 6

  # ===== NƯỚC TỰ NHIÊN (SÔNG, BIỂN) / NATURAL WATER (RIVERS, OCEANS) =====
  # [VI] Cấu hình hiệu ứng khi uống nước từ nguồn tự nhiên (sông, suối, biển)
  #     Nước từ vạc (cauldron) không bị ảnh hưởng. Có thể tắt hoàn toàn.
  # [EN] Effects when drinking from natural sources (rivers, streams, oceans).
  #     Water from cauldrons is NOT affected. Can be fully disabled.
  natural-water:
    # [VI] Bật hiệu ứng khi uống nước tự nhiên
    # [EN] Enable effects for drinking natural water
    enabled: true

    # [VI] Sát thương nhận được MỖI GIÂY khi uống nước tự nhiên (tim)
    # [EN] Damage taken PER SECOND when drinking natural water (hearts)
    damage-per-second: 0.5

    # [VI] Tổng thời gian chịu ảnh hưởng của nước bẩn (giây)
    # [EN] Total duration of dirty water effects (seconds)
    duration-seconds: 5

    # [VI] Cường độ hiệu ứng Nausea (buồn nôn / chóng mặt)
    #     0 = Cấp I, 1 = Cấp II, cứ thế tăng dần
    # [EN] Nausea (motion sickness) effect amplifier
    #     0 = Level I, 1 = Level II, and so on
    nausea-amplifier: 0

  # ===== CHAI LỌ / BOTTLES =====
  # [VI] Cho phép lấy nước vào chai thủy tinh từ nguồn nước
  # [EN] Allow filling glass bottles with water from sources
  bottle-fill: true

# ============================================================
# [ENVIRONMENT] 🌍 MÔI TRƯỜNG / ENVIRONMENT
# ============================================================
environment:
  # ===== NHIỆT ĐỘ / TEMPERATURE =====
  temperature:
    # [VI] Bật hệ thống nhiệt độ (nóng ở sa mạc, lạnh ở tuyết)
    # [EN] Enable temperature system (heat in deserts, cold in snow)
    enabled: true

    # [VI] Thời gian giữa các lần kiểm tra nhiệt độ (giây)
    # [EN] How often to check temperature (seconds)
    check-interval-seconds: 30

    # [VI] Sát thương khi ở nơi quá nóng (tim)
    # [EN] Damage when in hot environment (hearts)
    heat-damage: 2.0

    # [VI] Cường độ hiệu ứng nóng (0 = Cấp I, 1 = Cấp II...)
    # [EN] Heat effect amplifier (0 = Level I, 1 = Level II...)
    heat-amplifier: 1

    # [VI] % giảm cường độ hiệu ứng nóng khi đội mũ bảo hiểm (0.5 = 50%)
    #     Bất kỳ loại mũ nào cũng giúp giảm
    # [EN] % heat effect reduction when wearing a helmet (0.5 = 50%)
    #     Any helmet type helps reduce
    helmet-reduce-percent: 0.5

    # [VI] % giảm sát thương nóng khi đội mũ bảo hiểm (0.5 = 50%)
    #     Bất kỳ loại mũ nào cũng giúp giảm sát thương nóng
    # [EN] % heat damage reduction when wearing a helmet (0.5 = 50%)
    #     Any helmet type helps reduce heat damage
    helmet-damage-reduce-percent: 0.5

    # [VI] Thời gian phơi nắng tối thiểu (giây) trước khi bắt đầu hiệu ứng nóng
    #     Giúp người chơi có thời gian tìm bóng râm trước khi bị damage
    # [EN] Minimum exposure time (seconds) before heat effect starts
    #     Gives players time to find shade before taking damage
    heat-exposure-delay-seconds: 30

    # [VI] Sát thương khi ở nơi quá lạnh (tim)
    # [EN] Damage when in cold environment (hearts)
    cold-damage: 2.0

    # [VI] Cường độ hiệu ứng lạnh (0 = Cấp I, 1 = Cấp II...)
    # [EN] Cold effect amplifier (0 = Level I, 1 = Level II...)
    cold-amplifier: 1

    # [VI] % giảm cường độ hiệu ứng lạnh khi mặc giáp (0.25 = 25% mỗi món)
    #     Mỗi món giáp (mũ, áo, quần, giày) giảm độc lập
    # [EN] % cold effect reduction per armor piece (0.25 = 25% per piece)
    #     Each armor piece (helmet, chestplate, leggings, boots) reduces independently
    armor-reduce-percent: 0.20

    # [VI] % giảm sát thương lạnh mỗi món giáp (0.20 = 20% mỗi món)
    #     Mỗi món giáp (mũ, áo, quần, giày) giảm sát thương lạnh độc lập
    # [EN] % cold damage reduction per armor piece (0.20 = 20% per piece)
    #     Each armor piece (helmet, chestplate, leggings, boots) reduces cold damage independently
    armor-damage-reduce-percent: 0.20

    # [VI] Thời gian tiếp xúc lạnh tối thiểu (giây) trước khi bắt đầu hiệu ứng lạnh
    #     Giúp người chơi có thời gian tìm nơi ấm áp trước khi bị damage
    # [EN] Minimum exposure time (seconds) before cold effect starts
    #     Gives players time to find warmth before taking damage
    cold-exposure-delay-seconds: 30

  # ===== SƯƠNG MÙ / FOG (DARKNESS EFFECT) =====
  fog:
    # [VI] Bật hiệu ứng sương mù (Darkness effect)
    #     Làm tối tầm nhìn của người chơi định kỳ
    # [EN] Enable fog effect (Darkness effect)
    #     Periodically darkens the player's vision
    enabled: false

    # [VI] Thời gian giữa các đợt áp dụng sương mù (giây)
    #     Giá trị càng cao thì sương mù càng hiếm xuất hiện
    # [EN] Interval between fog applications (seconds)
    #     Higher values mean fog occurs less frequently
    interval-seconds: 60

    # [VI] Thời gian hiệu ứng sương mù kéo dài (giây)
    #     Giá trị càng cao thì càng mù lâu hơn
    # [EN] Duration of fog (Darkness) effect (seconds)
    #     Higher values means longer blindness
    effect-duration-seconds: 30

    # [VI] Cường độ hiệu ứng mù (0 = Cấp I nhẹ, 1 = Cấp II nặng hơn)
    #     Giá trị càng cao thì mù càng nặng
    # [EN] Fog effect amplifier (0 = Level I mild, 1 = Level II stronger)
    #     Higher values = stronger blindness
    effect-amplifier: 0

  # ===== NGỦ / SLEEP =====
  sleep:
    # [VI] Chặn ngủ (không cho phép lên giường)
    # [EN] Block sleeping (prevents using beds)
    block: true

    # [VI] Sát thương khi cố gắng ngủ (tim)
    # [EN] Damage taken when attempting to sleep (hearts)
    damage: 2.0

  # ===== CÂY TRỒNG / CROP GROWTH =====
  crop-slow:
    # [VI] Bật làm chậm sự phát triển của cây trồng
    # [EN] Enable slower crop growth
    enabled: true

    # [VI] Hệ số tốc độ phát triển (1.0 = bình thường, 0.5 = chậm 50%)
    # [EN] Growth speed multiplier (1.0 = normal, 0.5 = 50% slower)
    multiplier: 0.75

  # ===== ĐỘ BỀN CÔNG CỤ / TOOL DURABILITY =====
  tool-wear:
    # [VI] Bật hao mòn công cụ nhanh hơn
    # [EN] Enable faster tool wear
    enabled: true

    # [VI] Hệ số hao mòn thêm (1.0 = bình thường, 1.5 = hao nhanh gấp 1.5)
    # [EN] Extra durability loss multiplier (1.0 = normal, 1.5 = 1.5x faster)
    multiplier: 1.5

  # ===== BAY / FLIGHT =====
  flight:
    # [VI] Chặn bay (kể cả Creative mode, trừ khi có permission vnmine.hardcore.bypass)
    # [EN] Block flight (even in Creative mode, unless has vnmine.hardcore.bypass permission)
    block: false

  # ===== SỢ HẦM / CLAUSTROPHOBIA =====
  claustrophobia:
    # [VI] Bật hiệu ứng sợ hầm (dưới lòng đất)
    # [EN] Enable claustrophobia effect (underground)
    enabled: true

    # [VI] Cao độ Y tối đa để kích hoạt sợ hầm
    # [EN] Maximum Y level for claustrophobia to trigger
    y-level: 30

    # [VI] Tỷ lệ kích hoạt mỗi bước di chuyển (phần trăm)
    # [EN] Trigger chance per movement (percent)
    chance: 5

    # [VI] Cường độ hiệu ứng sợ hầm (0 = Cấp I, 1 = Cấp II...)
    # [EN] Claustrophobia effect amplifier (0 = Level I, 1 = Level II...)
    amplifier: 0

    # [VI] % giảm cường độ hiệu ứng khi cầm đuốc (0.5 = 50%)
    #     Cầm đuốc ở tay chính hoặc tay phụ đều có tác dụng
    # [EN] % effect reduction when holding a torch (0.5 = 50%)
    #     Holding torch in main hand or offhand works
    torch-reduce-percent: 1.0

  # ===== CHÓNG MẶT / VERTIGO =====
  vertigo:
    # [VI] Bật hiệu ứng chóng mặt (trên cao)
    # [EN] Enable vertigo effect (high altitude)
    enabled: true

    # [VI] Cao độ Y tối thiểu để kích hoạt chóng mặt
    # [EN] Minimum Y level for vertigo to trigger
    y-level: 170

    # [VI] Tỷ lệ kích hoạt mỗi bước di chuyển (phần trăm)
    # [EN] Trigger chance per movement (percent)
    chance: 10

    # [VI] Cường độ hiệu ứng chóng mặt (0 = Cấp I, 1 = Cấp II...)
    # [EN] Vertigo effect amplifier (0 = Level I, 1 = Level II...)
    amplifier: 1

    # [VI] % giảm cường độ hiệu ứng khi đeo cánh (0.5 = 50%)
    # [EN] % effect reduction when wearing elytra (0.5 = 50%)
    elytra-reduce-percent: 0.5

# ============================================================
# [VILLAGER TRADING] 🏘️ GIAO DỊCH DÂN LÀNG
# ============================================================
# [VI] Quản lý giao dịch của dân làng theo biome.
#      Khi đặt workstation, dân làng sẽ học nghề phù hợp với biome.
#      Nếu disable-random-villager: true, dân làng thất nghiệp không thể random nghề.
# [EN] Manages villager trading by biome.
#      When placing a workstation, villagers learn professions suitable for their biome.
#      If disable-random-villager: true, unemployed villagers cannot randomly acquire professions.
villager-trading:
  # [VI] Bật hệ thống giao dịch dân làng theo biome
  # [EN] Enable villager trading system by biome
  enabled: true

  # [VI] Không cho phép dân làng thất nghiệp học nghề random khi đặt workstation
  # [EN] Prevent unemployed villagers from randomly acquiring professions when placing workstations
  disable-random-villager: true

  # [VI] Kích thước vùng (region) để đánh dấu biome instance (khối)
  #     Mỗi vùng 500x500 blocks có data trade riêng, không phụ thuộc vùng khác
  #     Cùng biome nhưng khác vùng → data trade khác nhau
  # [EN] Region size to mark biome instances (blocks)
  #     Each 500x500 region has its own trade data, independent from other regions
  #     Same biome but different region → different trade data
  region-size: 500

# ============================================================
# [SPAWNER CONTROL] 🪤 KIỂM SOÁT LỒNG FARM
# ============================================================
# [VI] Kiểm soát quái vật sinh ra từ lồng farm (spawner).
#      Giảm số lượng, tăng HP và damage để cân bằng gameplay.
# [EN] Controls mobs spawned from spawners.
#      Reduces spawn rate, increases HP and damage to balance gameplay.
spawner-control:
  # [VI] Bật hệ thống kiểm soát lồng farm
  # [EN] Enable spawner control system
  enabled: true

  # [VI] Tỷ lệ spawn quái vật từ lồng (0.3 = 30% tỷ lệ gốc, giảm 70%)
  #     1.0 = spawn bình thường, 0.0 = không spawn gì cả
  # [EN] Mob spawn rate from spawners (0.3 = 30% of original rate, 70% reduction)
  #     1.0 = normal spawn, 0.0 = no spawns at all
  spawn-rate-reduction: 0.3

  # [VI] Hệ số nhân HP của quái vật từ lồng (3.0 = HP x3)
  # [EN] HP multiplier for spawner mobs (3.0 = 3x HP)
  hp-multiplier: 3.0

  # [VI] Hệ số nhân sát thương của quái vật từ lồng (2.0 = damage x2)
  #      Áp dụng dưới dạng hiệu ứng STRENGTH
  # [EN] Damage multiplier for spawner mobs (2.0 = 2x damage)
  #      Applied as STRENGTH effect
  damage-multiplier: 2.0

# ============================================================
# [DISASTERS] 🌋 THIÊN TAI / DISASTERS
# ============================================================
# [VI] Hệ thống thiên tai tự động xảy ra trong game.
#      Mỗi loại thiên tai là một object hoàn chỉnh với đầy đủ cấu hình.
# [EN] Automatic disaster system in the game.
#      Each disaster type is a complete object with all configuration.
disasters:
  # [VI] Bật hệ thống thiên tai tự động
  # [EN] Enable automatic disaster system
  enabled: true

  # [VI] Thời gian tối thiểu giữa các lần kiểm tra thiên tai (giây)
  #     Hỗ trợ dạng range: "500-1200" để random từ 500 đến 1200 giây
  #     Hoặc số cố định: 1200
  # [EN] Minimum seconds between disaster checks
  #     Supports range format: "500-1200" to randomize between 500-1200 seconds
  #     Or fixed number: 1200
  min-interval-seconds: 2400-4800

  # [VI] Thời gian cảnh báo trước khi thiên tai xảy ra (giây)
  # [EN] Warning time in seconds before a disaster strikes
  warning-seconds: 120

  # [VI] Các thông báo chung cho thiên tai
  # [EN] Common messages for disasters
  messages:
    # [VI] Tiêu đề khi cảnh báo thiên tai
    # [EN] Title when warning about disaster
    warning-title: "§4§l⚠ CẢNH BÁO THIÊN TAI ⚠"
    # [VI] Phụ đề khi cảnh báo thiên tai
    # [EN] Subtitle when warning about disaster
    warning-subtitle: "§c{name}\n§e§lSẽ xảy ra trong {time} giây!"
    # [VI] Thông báo broadcast khi bắt đầu cảnh báo
    # [EN] Broadcast message when warning starts
    warning-broadcast: "§4§l⚠ {name} §r§cđang đến gần!"
    # [VI] Thông báo countdown khi còn ít giây
    # [EN] Countdown broadcast message
    countdown-broadcast: "§4§l⚠ {name} §csẽ xảy ra trong §4§l{time}§c giây!"
    # [VI] Thông báo khi thiên tai đang hoạt động
    # [EN] Active broadcast message
    active-broadcast: "§4§l{name} - {message} (§e{duration}s§4)"
    # [VI] Thông báo khi thiên tai kết thúc
    # [EN] End broadcast message
    end-broadcast: "§a§l✅ {name} đã kết thúc!"

  # ===== OVERWORLD DISASTERS =====
  # 🌕 Trăng máu - Quái vật sinh sản ồ ạt, mạnh hơn
  blood-moon:
    # [VI] Bật/tắt thiên tai này
    # [EN] Enable/disable this disaster
    enabled: true
    # [VI] Tỷ lệ xuất hiện (phần trăm)
    # [EN] Spawn chance (percent)
    chance: 20
    # [VI] Tên hiển thị (hỗ trợ mã màu §)
    # [EN] Display name (supports color codes §)
    name: "§4§l🌕 Trăng Máu"
    # [VI] Tiêu đề khi thiên tai bắt đầu (hỗ trợ {name})
    #     Để trống để dùng mặc định: "§4§l{name}"
    # [EN] Title when disaster starts (supports {name})
    #     Leave empty to use default: "§4§l{name}"
    start-title: "§4§l🌕 Trăng Máu"
    # [VI] Phụ đề khi thiên tai bắt đầu (hỗ trợ {name})
    #     Để trống để dùng mặc định: "§c{startMsg}"
    # [EN] Subtitle when disaster starts (supports {name})
    #     Leave empty to use default: "§c{startMsg}"
    start-subtitle: "Quái vật trở nên mạnh mẽ"
    # [VI] Thời gian kéo dài tổng thể (giây)
    # [EN] Total duration (seconds)
    duration-seconds: 180
    # [VI] Thời gian giữa các đợt áp dụng hiệu ứng (giây)
    # [EN] Interval between effect applications (seconds)
    effect-interval-seconds: 5
    # [VI] Thời gian kéo dài của mỗi đợt hiệu ứng (giây)
    # [EN] Duration of each effect wave (seconds)
